{% extends 'base.html' %}
{% block title %}دليل الحسابات - نظام الحسابات المصري{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h2>📁 دليل الحسابات</h2>
        <div>
            <button onclick="collapseAll()" class="btn btn-secondary btn-sm">📁 طي الكل</button>
            <button onclick="expandAll()" class="btn btn-secondary btn-sm">📂 توسيع الكل</button>
        </div>
    </div>
    <div id="accounts-tree">
        <div style="text-align: center; padding: 40px;">جاري تحميل الحسابات...</div>
    </div>
</div>

<style>
    .tree-container {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        max-height: 600px;
        overflow-y: auto;
        padding: 10px;
    }
    
    .tree {
        list-style: none;
        padding-right: 0;
        margin: 0;
    }
    
    .tree li {
        list-style: none;
        margin: 5px 0;
        position: relative;
    }
    
    .tree .node {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: white;
        border: 1px solid #e9ecef;
    }
    
    .tree .node:hover {
        background: #f8f9fa;
        border-color: #1e3c72;
    }
    
    .tree .node.selected {
        background: #e3f2fd;
        border-color: #1e3c72;
        box-shadow: 0 0 0 2px rgba(30,60,114,0.2);
    }
    
    .tree .node-content {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
    }
    
    .tree .toggle-icon {
        width: 24px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 14px;
        color: #6c757d;
        transition: transform 0.2s;
    }
    
    .tree .toggle-icon.rotated {
        transform: rotate(90deg);
    }
    
    .tree .folder-icon {
        font-size: 20px;
        width: 28px;
        text-align: center;
    }
    
    .tree .account-name {
        font-size: 14px;
        font-weight: 500;
    }
    
    .tree .account-code {
        font-size: 12px;
        color: #6c757d;
        margin-right: 8px;
    }
    
    .tree .account-type {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px;
        background: #e9ecef;
        color: #495057;
        margin-right: 10px;
    }
    
    .tree .account-type.asset {
        background: #d4edda;
        color: #155724;
    }
    
    .tree .account-type.liability {
        background: #f8d7da;
        color: #721c24;
    }
    
    .tree .account-type.equity {
        background: #d1ecf1;
        color: #0c5460;
    }
    
    .tree .account-type.revenue {
        background: #fff3cd;
        color: #856404;
    }
    
    .tree .account-type.expense {
        background: #e2e3e5;
        color: #383d41;
    }
    
    .tree .account-actions {
        display: flex;
        gap: 8px;
        opacity: 0;
        transition: opacity 0.2s;
    }
    
    .tree .node:hover .account-actions {
        opacity: 1;
    }
    
    .tree .children {
        padding-right: 30px;
        margin-top: 5px;
    }
    
    .tree .children.collapsed {
        display: none;
    }
    
    .tree .leaf-icon {
        font-size: 18px;
        width: 28px;
        text-align: center;
    }
    
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    .modal.active {
        display: flex;
    }
    .modal-content {
        background: white;
        border-radius: 16px;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
    }
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        border-bottom: 1px solid #e0e0e0;
    }
    .modal-header h3 {
        margin: 0;
        color: #1e3c72;
    }
    .modal-close {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #999;
    }
    .modal-close:hover {
        color: #dc3545;
    }
    .form-group {
        margin-bottom: 20px;
        padding: 0 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #555;
    }
    .form-control {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
    }
    .modal-buttons {
        padding: 20px;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        border-top: 1px solid #e0e0e0;
    }
</style>

<div id="add-account-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>➕ إضافة حساب جديد</h3>
            <button type="button" class="modal-close" onclick="closeAddAccountModal()">✖</button>
        </div>
        <form id="add-account-form">
            {% csrf_token %}
            <input type="hidden" name="parent" id="parent-account-id">
            
            <div class="form-group">
                <label>الحساب الأب</label>
                <input type="text" id="parent-account-display" class="form-control" readonly style="background: #f8f9fa;">
            </div>
            
            <div class="form-group">
                <label>رقم الحساب (سيتوليد تلقائياً)</label>
                <input type="text" id="account-code" class="form-control" readonly style="background: #f8f9fa;">
            </div>
            
            <div class="form-group">
                <label>اسم الحساب *</label>
                <input type="text" name="name" id="account-name" class="form-control" required placeholder="مثال: حساب جديد">
            </div>
            
            <div class="form-group">
                <label>نوع الحساب *</label>
                <select name="type" id="account-type" class="form-control">
                    <option value="asset">أصل</option>
                    <option value="liability">خصم</option>
                    <option value="equity">حقوق ملكية</option>
                    <option value="revenue">إيراد</option>
                    <option value="expense">مصروف</option>
                    <option value="cost_of_sales">تكلفة مبيعات</option>
                </select>
            </div>
            
            <div class="modal-buttons">
                <button type="submit" class="btn btn-primary">💾 إضافة الحساب</button>
                <button type="button" class="btn btn-secondary" onclick="closeAddAccountModal()">إلغاء</button>
            </div>
        </form>
    </div>
</div>

<script>
let allAccountsTree = [];
let allAccountsFlat = [];
let collapsedState = {};

function saveCollapsedState() {
    localStorage.setItem('accountsCollapsedState', JSON.stringify(collapsedState));
}

function loadCollapsedState() {
    const saved = localStorage.getItem('accountsCollapsedState');
    if (saved) {
        collapsedState = JSON.parse(saved);
    }
}

function collapseAll() {
    document.querySelectorAll('.tree .children').forEach(children => {
        children.classList.add('collapsed');
        const toggleIcon = children.parentElement?.querySelector('.toggle-icon');
        if (toggleIcon) {
            toggleIcon.classList.remove('rotated');
        }
        const parentId = children.parentElement?.getAttribute('data-id');
        if (parentId) {
            collapsedState[parentId] = true;
        }
    });
    saveCollapsedState();
}

function expandAll() {
    document.querySelectorAll('.tree .children').forEach(children => {
        children.classList.remove('collapsed');
        const toggleIcon = children.parentElement?.querySelector('.toggle-icon');
        if (toggleIcon) {
            toggleIcon.classList.add('rotated');
        }
        const parentId = children.parentElement?.getAttribute('data-id');
        if (parentId) {
            collapsedState[parentId] = false;
        }
    });
    saveCollapsedState();
}

function generateAccountCode(parentId) {
    const siblings = allAccountsFlat.filter(acc => acc.parent_id === parentId);
    
    if (siblings.length === 0) {
        const parentAccount = allAccountsFlat.find(acc => acc.id === parentId);
        if (parentAccount) {
            return parentAccount.code + '01';
        }
        return '001';
    }
    
    let maxCode = 0;
    siblings.forEach(sib => {
        const num = parseInt(sib.code);
        if (!isNaN(num) && num > maxCode) {
            maxCode = num;
        }
    });
    
    return (maxCode + 1).toString();
}

function openAddAccountModal(parentId, parentName) {
    const newCode = generateAccountCode(parentId);
    
    document.getElementById('parent-account-id').value = parentId;
    document.getElementById('parent-account-display').value = parentName;
    document.getElementById('account-code').value = newCode;
    document.getElementById('account-name').value = '';
    document.getElementById('account-type').value = 'asset';
    
    document.getElementById('add-account-modal').classList.add('active');
}

function closeAddAccountModal() {
    document.getElementById('add-account-modal').classList.remove('active');
}

async function loadAccountsTree() {
    try {
        const response = await fetch('/api/accounts/tree/');
        allAccountsTree = await response.json();
        
        const flatResponse = await fetch('/api/accounts/api/list/');
        allAccountsFlat = await flatResponse.json();
        
        loadCollapsedState();
        renderTree(allAccountsTree);
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('accounts-tree').innerHTML = '<div style="text-align: center; padding: 40px; color: red;">حدث خطأ في تحميل الحسابات: ' + error.message + '</div>';
    }
}

function renderTree(accounts, container = document.getElementById('accounts-tree')) {
    if (!accounts || accounts.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 40px;">لا توجد حسابات</div>';
        return;
    }
    
    const treeContainer = document.createElement('div');
    treeContainer.className = 'tree-container';
    const ul = document.createElement('ul');
    ul.className = 'tree';
    
    accounts.forEach(account => {
        const li = createTreeNode(account);
        ul.appendChild(li);
    });
    
    treeContainer.appendChild(ul);
    container.innerHTML = '';
    container.appendChild(treeContainer);
}

function createTreeNode(account, level = 0) {
    const li = document.createElement('li');
    li.setAttribute('data-id', account.id);
    const hasChildren = account.children && account.children.length > 0;
    
    const nodeDiv = document.createElement('div');
    nodeDiv.className = 'node';
    nodeDiv.style.marginRight = `${level * 20}px`;
    
    nodeDiv.onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll('.tree .node').forEach(n => n.classList.remove('selected'));
        nodeDiv.classList.add('selected');
        openAddAccountModal(account.id, `${account.code} - ${account.name}`);
    };
    
    const contentDiv = document.createElement('div');
    contentDiv.className = 'node-content';
    
    if (hasChildren) {
        const toggleSpan = document.createElement('span');
        toggleSpan.className = 'toggle-icon';
        toggleSpan.innerHTML = '▶';
        
        const isCollapsed = collapsedState[account.id] === true;
        
        toggleSpan.onclick = (e) => {
            e.stopPropagation();
            const childrenDiv = li.querySelector('.children');
            if (childrenDiv) {
                childrenDiv.classList.toggle('collapsed');
                toggleSpan.classList.toggle('rotated');
                collapsedState[account.id] = childrenDiv.classList.contains('collapsed');
                saveCollapsedState();
            }
        };
        contentDiv.appendChild(toggleSpan);
        
        if (isCollapsed) {
            setTimeout(() => {
                const childrenDiv = li.querySelector('.children');
                if (childrenDiv) {
                    childrenDiv.classList.add('collapsed');
                    toggleSpan.classList.remove('rotated');
                }
            }, 0);
        } else {
            toggleSpan.classList.add('rotated');
        }
    } else {
        const spacer = document.createElement('span');
        spacer.style.width = '24px';
        spacer.style.display = 'inline-block';
        contentDiv.appendChild(spacer);
    }
    
    const iconSpan = document.createElement('span');
    iconSpan.className = hasChildren ? 'folder-icon' : 'leaf-icon';
    iconSpan.innerHTML = hasChildren ? '📁' : '📄';
    contentDiv.appendChild(iconSpan);
    
    const nameSpan = document.createElement('span');
    nameSpan.className = 'account-name';
    nameSpan.innerHTML = `<span class="account-code">${account.code}</span> ${account.name}`;
    contentDiv.appendChild(nameSpan);
    
    const typeSpan = document.createElement('span');
    typeSpan.className = `account-type ${account.type}`;
    const typeNames = {
        'asset': 'أصل',
        'liability': 'خصم',
        'equity': 'حقوق ملكية',
        'revenue': 'إيراد',
        'expense': 'مصروف',
        'cost_of_sales': 'تكلفة مبيعات'
    };
    typeSpan.innerHTML = typeNames[account.type] || account.type;
    contentDiv.appendChild(typeSpan);
    
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'account-actions';
    actionsDiv.innerHTML = `
        <a href="/api/accounts/${account.id}/update/" class="btn btn-warning btn-sm" style="padding: 3px 10px; font-size: 12px;">✏️</a>
        <a href="/api/accounts/${account.id}/delete/" class="btn btn-danger btn-sm" style="padding: 3px 10px; font-size: 12px;" onclick="return confirm('هل أنت متأكد من حذف هذا الحساب؟')">🗑️</a>
    `;
    contentDiv.appendChild(actionsDiv);
    
    nodeDiv.appendChild(contentDiv);
    li.appendChild(nodeDiv);
    
    if (hasChildren) {
        const childrenDiv = document.createElement('div');
        childrenDiv.className = 'children';
        
        if (collapsedState[account.id] === true) {
            childrenDiv.classList.add('collapsed');
        }
        
        const childrenUl = document.createElement('ul');
        childrenUl.className = 'tree';
        childrenUl.style.listStyle = 'none';
        childrenUl.style.paddingRight = '0';
        
        account.children.forEach(child => {
            const childLi = createTreeNode(child, level + 1);
            childrenUl.appendChild(childLi);
        });
        
        childrenDiv.appendChild(childrenUl);
        li.appendChild(childrenDiv);
    }
    
    return li;
}

document.getElementById('add-account-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData();
    formData.append('code', document.getElementById('account-code').value);
    formData.append('name', document.getElementById('account-name').value);
    formData.append('type', document.getElementById('account-type').value);
    formData.append('parent', document.getElementById('parent-account-id').value);
    
    try {
        const response = await fetch('/api/accounts/create/', {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            }
        });
        
        if (response.ok) {
            alert('✅ تم إضافة الحساب بنجاح');
            closeAddAccountModal();
            loadAccountsTree();
        } else {
            const error = await response.json();
            alert('❌ خطأ: ' + (error.error || 'حدث خطأ'));
        }
    } catch (error) {
        alert('❌ حدث خطأ في الاتصال بالخادم');
    }
});

document.addEventListener('DOMContentLoaded', loadAccountsTree);
</script>
{% endblock %}
