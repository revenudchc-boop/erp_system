{% extends 'base.html' %}
{% block title %}{{ title }} - نظام الحسابات المصري{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h2>{{ title }}</h2>
        <a href="{% url 'suppliers_list' %}" class="btn btn-secondary">← رجوع</a>
    </div>
    
    <form method="post">
        {% csrf_token %}
        
        <!-- حقل الحساب الأب -->
        <div class="form-group">
            <label>🏦 الحساب الأب في شجرة الحسابات</label>
            <select name="parent_account" class="form-control">
                <option value="">-- الحساب الافتراضي (دائنون) --</option>
                {% for acc in parent_accounts %}
                <option value="{{ acc.id }}">
                    {% if acc.code == '211' %}
                        📁 {{ acc.code }} - {{ acc.name }}
                    {% else %}
                        &nbsp;&nbsp;&nbsp;📄 {{ acc.code }} - {{ acc.name }}
                    {% endif %}
                </option>
                {% endfor %}
            </select>
            <small class="text-muted">اختر الحساب الذي سيتم إضافة المورد تحته في شجرة الحسابات (فروع دائنون فقط)</small>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>اسم المورد *</label>
                <input type="text" name="name" required placeholder="الاسم الكامل أو اسم الشركة">
            </div>
            
            <div class="form-group">
                <label>رقم السجل الضريبي</label>
                <input type="text" name="tax_number" placeholder="رقم السجل الضريبي">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>السجل التجاري</label>
                <input type="text" name="commercial_record" placeholder="رقم السجل التجاري">
            </div>
            
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" name="phone" placeholder="مثال: 01234567890">
            </div>
        </div>
        
        <div class="form-group">
            <label>العنوان</label>
            <textarea name="address" rows="2" placeholder="العنوان بالكامل"></textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" name="email" placeholder="example@domain.com">
            </div>
            
            <div class="form-group">
                <label>شروط السداد (أيام)</label>
                <input type="number" name="payment_terms" placeholder="مثال: 30">
                <small style="color: #666;">عدد أيام السداد المتاحة</small>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>العملة</label>
                <select name="currency">
                    <option value="">العملة الافتراضية (جنيه مصري)</option>
                    {% for curr in currencies %}
                    <option value="{{ curr.id }}">{{ curr.code }} - {{ curr.name_ar }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>ملاحظات</label>
            <textarea name="notes" rows="3" placeholder="ملاحظات إضافية عن المورد"></textarea>
        </div>
        
        <div class="modal-buttons">
            <button type="submit" class="btn btn-primary">حفظ</button>
            <a href="{% url 'suppliers_list' %}" class="btn btn-secondary">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
