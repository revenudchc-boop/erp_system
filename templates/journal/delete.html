{% extends 'base.html' %}
{% block title %}حذف قيد - نظام الحسابات المصري{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h2>🗑️ حذف قيد</h2>
        <a href="{% url 'entry_list' %}" class="btn btn-secondary">← رجوع</a>
    </div>
    <p>هل أنت متأكد من حذف القيد <strong>{{ entry.date|date:"Y-m-d" }} - {{ entry.description|truncatechars:50 }}</strong>؟</p>
    <form method="post">
        {% csrf_token %}
        <div class="modal-buttons">
            <button type="submit" class="btn btn-danger">نعم، حذف</button>
            <a href="{% url 'entry_list' %}" class="btn btn-secondary">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
