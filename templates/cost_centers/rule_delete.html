{% extends 'base.html' %}
{% block title %}حذف قاعدة توزيع - نظام الحسابات المصري{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h2>🗑️ حذف قاعدة توزيع</h2>
        <a href="{% url 'allocation_rules_list' %}" class="btn btn-secondary">← رجوع</a>
    </div>
    
    <p>هل أنت متأكد من حذف قاعدة التوزيع <strong>{{ rule.name }}</strong>؟</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="modal-buttons">
            <button type="submit" class="btn btn-danger">نعم، حذف</button>
            <a href="{% url 'allocation_rules_list' %}" class="btn btn-secondary">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
