{% extends 'base.html' %}
{% block title %}{{ title }} - نظام الحسابات المصري{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h2>{{ title }}</h2>
        <a href="{% url 'currencies_list' %}" class="btn btn-secondary">← رجوع</a>
    </div>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-row">
            <div class="form-group">
                <label>كود العملة *</label>
                <input type="text" name="code" value="{{ currency.code|default:'' }}" required placeholder="مثال: USD, EUR, SAR">
                <small style="color: #666;">ثلاثة أحرف بالانجليزية</small>
            </div>
            
            <div class="form-group">
                <label>الرمز (مثل $, €, ج.م)</label>
                <input type="text" name="symbol" value="{{ currency.symbol|default:'' }}" placeholder="مثال: $">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>الاسم بالعربية *</label>
                <input type="text" name="name_ar" value="{{ currency.name_ar|default:'' }}" required placeholder="مثال: دولار أمريكي">
            </div>
            
            <div class="form-group">
                <label>الاسم بالإنجليزية</label>
                <input type="text" name="name_en" value="{{ currency.name_en|default:'' }}" placeholder="مثال: US Dollar">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>سعر الصرف مقابل العملة الأساسية</label>
                <input type="number" name="exchange_rate" step="0.000001" value="{{ currency.exchange_rate|default:1 }}" required>
                <small style="color: #666;">كم وحدة من العملة الأساسية تساوي وحدة واحدة من هذه العملة</small>
            </div>
            
            <div class="form-group">
                <label>عدد الأرقام العشرية</label>
                <input type="number" name="decimal_places" value="{{ currency.decimal_places|default:2 }}" min="0" max="6">
            </div>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_base" {% if currency.is_base %}checked{% endif %}>
                عملة أساسية (يتم تسعير جميع العملات مقابلها)
            </label>
            <small style="display: block; color: #666;">يمكن أن تكون عملة واحدة فقط هي الأساسية</small>
        </div>
        
        <div class="modal-buttons">
            <button type="submit" class="btn btn-primary">حفظ</button>
            <a href="{% url 'currencies_list' %}" class="btn btn-secondary">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
